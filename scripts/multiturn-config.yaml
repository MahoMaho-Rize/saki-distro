# TAG Gateway config for multi-turn integration test
# Full stack: provider + MCP + ext_proc (session-hook + context-mgr)

listen: ":18280"
max_react_iterations: 10
sse_keepalive_ms: 15000

providers:
  - name: anthropic
    base_url: "http://192.168.190.105:8088/api"
    api_key: "${ANTHROPIC_AUTH_TOKEN}"
    models:
      - name: "claude-sonnet-4-20250514"
        context_window: 200000
        max_output_tokens: 16384

mcp:
  inject_mode: "auto"
  servers:
    - name: fs
      transport: http
      url: "http://127.0.0.1:19300/mcp"
      timeout_sec: 30
    - name: exec
      transport: http
      url: "http://127.0.0.1:19301/mcp"
      timeout_sec: 120

ext_proc:
  enabled: true
  default_timeout_ms: 5000
  hooks:
    - command: "${SESSION_HOOK_BIN}"
      order: 10
      env:
        SQLITE_PATH: "${SQLITE_PATH}"
        MAX_MESSAGES: "100"
    - command: "${CONTEXT_MGR_BIN}"
      order: 20

log:
  level: "info"
  pretty: false
