# Claw Distro — local development compose
# Usage: docker-compose -f deploy/docker-compose.yaml up -d

services:
  tagd:
    image: tag-gateway:latest
    ports:
      - "8080:8080"
    volumes:
      - ../config/tagd.yaml:/etc/tag-gateway/config.yaml:ro
    environment:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
    networks:
      - claw-internal
    depends_on:
      - claw-fs
      - claw-exec

  claw-fs:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.claw-fs
    volumes:
      - ${HOST_PROJECT:-.}:/host-project:ro  # read-only host mount
      - workspace:/workspace                  # writable staging
    environment:
      - CLAW_HOST_PROJECT=/host-project
    networks:
      - claw-internal

  claw-exec:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.claw-exec
    volumes:
      - ${HOST_PROJECT:-.}:/host-project:ro
      - workspace:/workspace
    networks:
      - claw-internal
      - claw-external  # needs network for pip install, npm install, etc.
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2"

volumes:
  workspace:

networks:
  claw-internal:
    internal: true  # no external access
  claw-external:
